<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSUE Programming Career</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1E2A5E 0%, #0f1a3d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            font-size: 1.5rem;
            color: #1E2A5E;
            margin-bottom: 30px;
        }
        h1 span {
            color: #E58A2E;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: #f0f0f0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: #1E2A5E;
            color: white;
        }
        .form {
            display: none;
        }
        .form.active {
            display: block;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #E58A2E;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #1E2A5E;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .message.error {
            background: #ffe0e0;
            color: #d32f2f;
            display: block;
        }
        .message.success {
            background: #e0ffe0;
            color: #2e7d32;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TSUE <span>PROGRAMMING CAREER</span></h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('register')">Ro'yxatdan o'tish</button>
            <button class="tab-btn" onclick="showTab('login')">Profilga kirish</button>
        </div>

        <div id="registerForm" class="form active">
            <input type="text" id="regFirstName" placeholder="Ism">
            <input type="text" id="regLastName" placeholder="Familiya">
            <input type="password" id="regPassword" placeholder="Parol">
            <button onclick="register()">Ro'yxatdan o'tish</button>
        </div>

        <div id="loginForm" class="form">
            <input type="text" id="loginFirstName" placeholder="Ism">
            <input type="text" id="loginLastName" placeholder="Familiya">
            <input type="password" id="loginPassword" placeholder="Parol">
            <button onclick="login()">Kirish</button>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script>
        const API_URL = window.location.origin;

        function showTab(tab) {
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (tab === 'register') {
                document.getElementById('registerForm').classList.add('active');
                document.querySelector('.tab-btn:first-child').classList.add('active');
            } else {
                document.getElementById('loginForm').classList.add('active');
                document.querySelector('.tab-btn:last-child').classList.add('active');
            }
            document.getElementById('message').className = 'message';
        }

        function showMessage(text, isError = true) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + (isError ? 'error' : 'success');
            setTimeout(() => {
                msg.className = 'message';
            }, 3000);
        }

        async function register() {
            const firstName = document.getElementById('regFirstName').value;
            const lastName = document.getElementById('regLastName').value;
            const password = document.getElementById('regPassword').value;

            if (!firstName || !lastName || !password) {
                showMessage('Barcha maydonlarni to\'ldiring!');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, password })
                });
                const data = await res.json();
                if (data.success) {
                    showMessage('Ro\'yxatdan o\'tdingiz! Profilga kiring.', false);
                    showTab('login');
                } else {
                    showMessage(data.error || 'Xatolik yuz berdi');
                }
            } catch (err) {
                showMessage('Server bilan bog\'lanib bo\'lmadi');
            }
        }

        async function login() {
            const firstName = document.getElementById('loginFirstName').value;
            const lastName = document.getElementById('loginLastName').value;
            const password = document.getElementById('loginPassword').value;

            if (!firstName || !lastName || !password) {
                showMessage('Barcha maydonlarni to\'ldiring!');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('userId', data.user.id);
                    localStorage.setItem('userName', `${data.user.first_name} ${data.user.last_name}`);
                    window.location.href = '/dashboard.html';
                } else {
                    showMessage(data.error || 'Xatolik yuz berdi');
                }
            } catch (err) {
                showMessage('Server bilan bog\'lanib bo\'lmadi');
            }
        }
    </script>
</body>
</html>
