<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | TSUE Career</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
        }
        .navbar {
            background: #1E2A5E;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .logo span {
            color: #E58A2E;
        }
        .logout-btn {
            background: #E58A2E;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .welcome {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .welcome h2 {
            color: #1E2A5E;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        .card h3 {
            color: #1E2A5E;
            margin-bottom: 10px;
        }
        .card p {
            color: #666;
            font-size: 0.9rem;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            margin: 50px auto;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .close {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }
        .direction-option {
            background: #f5f5f5;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
        }
        .direction-option:hover {
            background: #E58A2E;
            color: white;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">TSUE <span>CAREER</span></div>
        <button class="logout-btn" onclick="logout()">Chiqish</button>
    </div>

    <div class="container">
        <div class="welcome">
            <h2 id="welcomeText">Xush kelibsiz!</h2>
            <p>O'z yo'nalishingizni tanlang va karerangizni boshlang</p>
        </div>

        <div class="grid">
            <div class="card" onclick="showDirectionInfo()">
                <div class="card-icon">📚</div>
                <h3>Yo'nalish haqida</h3>
                <p>Tanlagan yo'nalishingiz haqida ma'lumot</p>
            </div>
            <div class="card" onclick="selectDirection()">
                <div class="card-icon">🎯</div>
                <h3>Yo'nalish tanlash</h3>
                <p>3 ta yo'nalishdan birini tanlang</p>
            </div>
            <div class="card" onclick="showRanking()">
                <div class="card-icon">🏆</div>
                <h3>Reyting</h3>
                <p>Eng yaxshi talabalar</p>
            </div>
            <div class="card" onclick="showTelegram()">
                <div class="card-icon">📱</div>
                <h3>Guruh</h3>
                <p>Telegram guruhiga qo'shiling</p>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const userId = localStorage.getItem('userId');
        const userName = localStorage.getItem('userName');

        if (!userId) {
            window.location.href = '/';
        }

        document.getElementById('welcomeText').innerHTML = `Xush kelibsiz, ${userName || 'Foydalanuvchi'}! 👋`;

        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function selectDirection() {
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <h2>Yo'nalish tanlang</h2>
                <div class="direction-option" onclick="saveDirection('suniy intellekt')">🤖 Suniy intellekt</div>
                <div class="direction-option" onclick="saveDirection('axborot xavfsizligi')">🔒 Axborot xavfsizligi</div>
                <div class="direction-option" onclick="saveDirection('statistika')">📊 Statistika</div>
            `;
            document.getElementById('modal').style.display = 'block';
        }

        function saveDirection(direction) {
            localStorage.setItem('userDirection', direction);
            alert(`"${direction}" yo'nalishi tanlandi!`);
            closeModal();
        }

        function showDirectionInfo() {
            const direction = localStorage.getItem('userDirection');
            if (!direction) {
                alert('Iltimos, avval yo\'nalish tanlang!');
                return;
            }
            const info = {
                'suniy intellekt': 'Suniy intellekt – kompyuterlarni inson kabi fikrlashga o‘rgatish. Python, Machine Learning, Deep Learning, TensorFlow va PyTorch kabi texnologiyalar o‘rganiladi.',
                'axborot xavfsizligi': 'Axborot xavfsizligi – maʼlumotlarni ruxsatsiz kirishdan himoya qilish. Kriptografiya, tarmoq xavfsizligi, penetration testing asosiy yo‘nalishlar.',
                'statistika': 'Statistika – maʼlumotlarni to‘plash, tahlil qilish va xulosa chiqarish. Data science, ehtimollar nazariyasi va statistik modellashtirish asosiy mavzular.'
            };
            document.getElementById('modalBody').innerHTML = `
                <h2>${direction}</h2>
                <p>${info[direction]}</p>
                <br>
                <h3>📚 O'rganish uchun resurslar:</h3>
                <ul>
                    ${direction === 'suniy intellekt' ? '<li><a href="https://learnpython.org" target="_blank">Python.org</a></li><li><a href="https://tensorflow.org" target="_blank">TensorFlow</a></li>' : ''}
                    ${direction === 'axborot xavfsizligi' ? '<li><a href="https://kali.org" target="_blank">Kali Linux</a></li><li><a href="https://tryhackme.com" target="_blank">TryHackMe</a></li>' : ''}
                    ${direction === 'statistika' ? '<li><a href="https://scipy.org" target="_blank">SciPy</a></li><li><a href="https://kaggle.com" target="_blank">Kaggle</a></li>' : ''}
                </ul>
            `;
            document.getElementById('modal').style.display = 'block';
        }

        function showRanking() {
            document.getElementById('modalBody').innerHTML = `
                <h2>🏆 Reyting</h2>
                <p>Hozircha reyting ma'lumotlari mavjud emas.</p>
                <p>Topshiriqlar bajarilgandan so'ng reyting paydo bo'ladi.</p>
            `;
            document.getElementById('modal').style.display = 'block';
        }

        function showTelegram() {
            window.open('https://t.me/+1WNbg57C2FQwZjAy', '_blank');
        }
    </script>
</body>
</html>
